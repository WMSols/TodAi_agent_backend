<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TodAI — Goal planner</title>
  <script src="/static/auth.js"></script>
  <style>
    :root { --bg: #0f1419; --card: #1a2332; --text: #e7ecf3; --muted: #8b9cb3; --accent: #6ee7b7; }
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; }
    header { padding: 1rem 1.5rem; border-bottom: 1px solid #2a3544; display: flex; gap: 1rem; align-items: center; }
    header a { color: var(--accent); }
    main { max-width: 720px; margin: 0 auto; padding: 1.5rem; }
    .card { background: var(--card); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.25rem; }
    input, textarea { width: 100%; padding: 0.6rem; border-radius: 8px; border: 1px solid #2a3544; background: #0f1419; color: var(--text); margin-bottom: 0.75rem; }
    button { background: var(--accent); color: #0f1419; border: none; padding: 0.6rem 1rem; border-radius: 8px; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: 0.5; }
    #log { min-height: 200px; white-space: pre-wrap; font-size: 0.9rem; }
    .msg-user { color: #93c5fd; margin: 0.5rem 0; }
    .msg-assistant { color: var(--text); margin: 0.5rem 0; }
    #auth-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 10; }
    #auth-overlay.hidden { display: none; }
  </style>
</head>
<body>
  <header>
    <strong>Goal planner</strong>
    <a href="/">← Main app</a>
    <span style="color:var(--muted);font-size:0.85rem">(use Mode → Goal planner on home page)</span>
    <span id="user-chip" style="color:var(--muted);font-size:0.85rem"></span>
  </header>
  <div id="auth-overlay" class="hidden"><p>Sign in on the <a href="/">main app</a> first.</p></div>
  <main>
    <div class="card">
      <label>Goal title</label>
      <input id="goal-title" placeholder="e.g. Learn Python basics" />
      <label>Description (optional)</label>
      <textarea id="goal-desc" rows="3" placeholder="What you want to achieve in 7 days"></textarea>
      <button id="btn-start">Start plan</button>
    </div>
    <div class="card">
      <label>Chat</label>
      <div id="log"></div>
      <textarea id="msg" rows="2" placeholder="Answer the agent…" disabled></textarea>
      <button id="btn-send" disabled>Send</button>
    </div>
  </main>
  <script>
    let planId = null;
    const logEl = document.getElementById("log");

    function append(role, text) {
      const p = document.createElement("div");
      p.className = role === "user" ? "msg-user" : "msg-assistant";
      p.textContent = (role === "user" ? "You: " : "Agent: ") + text;
      logEl.appendChild(p);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function authHeaders() {
      return typeof TodaiAuth !== "undefined" ? TodaiAuth.authHeaders() : { "Content-Type": "application/json" };
    }

    async function ensureAuth() {
      const cfg = await TodaiAuth.loadConfig();
      if (!cfg.auth_required) {
        document.getElementById("auth-overlay").classList.add("hidden");
        return true;
      }
      await TodaiAuth.prepare();
      if (!TodaiAuth.userId()) {
        document.getElementById("auth-overlay").classList.remove("hidden");
        return false;
      }
      document.getElementById("user-chip").textContent = TodaiAuth.userLabel();
      document.getElementById("auth-overlay").classList.add("hidden");
      return true;
    }

    document.getElementById("btn-start").onclick = async function () {
      if (!(await ensureAuth())) return;
      const title = document.getElementById("goal-title").value.trim();
      if (!title) return alert("Enter a goal title");
      const r = await fetch("/api/goals/plan/start", {
        method: "POST",
        headers: authHeaders(),
        body: JSON.stringify({ title, description: document.getElementById("goal-desc").value.trim() }),
      });
      const body = await r.json();
      if (!r.ok) return alert(body.detail || "Start failed");
      planId = body.plan_id;
      logEl.innerHTML = "";
      append("assistant", "Plan started. Answer questions to build your 7-day schedule.");
      document.getElementById("msg").disabled = false;
      document.getElementById("btn-send").disabled = false;
      const st = await fetch("/api/goals/plan/" + planId, { headers: authHeaders() });
      const state = await st.json();
      (state.messages || []).forEach(function (m) {
        append(m.role, m.content);
      });
    };

    document.getElementById("btn-send").onclick = async function () {
      if (!planId) return;
      const message = document.getElementById("msg").value.trim();
      if (!message) return;
      append("user", message);
      document.getElementById("msg").value = "";
      const r = await fetch("/api/goals/plan/message", {
        method: "POST",
        headers: authHeaders(),
        body: JSON.stringify({ plan_id: planId, message }),
      });
      const body = await r.json();
      if (!r.ok) return append("assistant", "Error: " + (body.detail || r.status));
      append("assistant", body.reply_text || "");
    };

    ensureAuth();
  </script>
</body>
</html>
