<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TodAI</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3b82f6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid #2a3545;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem 1rem;
    }
    header h1 { font-size: 1.05rem; margin: 0; font-weight: 600; }
    #state-bar { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; margin-left: auto; }
    #state-pill {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 0.2rem 0.55rem;
      border-radius: 6px;
      border: 1px solid #2a3545;
      background: #243047;
    }
    #state-pill.state-idle { border-color: #166534; background: #0f2918; color: #86efac; }
    #state-pill.state-analyzing,
    #state-pill.state-requesting_data { border-color: #1d4ed8; background: #0f1f3d; color: #93c5fd; }
    #state-pill.state-error { border-color: #991b1b; background: #2a1212; color: #fca5a5; }
    #status-meta { font-size: 0.8rem; color: var(--muted); }
    #usage-pill {
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.2rem 0.55rem;
      border-radius: 6px;
      border: 1px solid #2a3545;
      background: #1e2a3d;
      color: #cbd5e1;
      font-variant-numeric: tabular-nums;
    }
    #usage-pill.usage-warn { border-color: #b45309; background: #422006; color: #fde68a; }
    #usage-pill.usage-hot { border-color: #991b1b; background: #2a1212; color: #fca5a5; }

    main.layout {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr min(420px, 38vw);
      min-height: 0;
      overflow: hidden;
    }
    main.layout > #chat-panel,
    main.layout > #debug-panel {
      min-height: 0;
      overflow: hidden;
    }
    #chat-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-right: 1px solid #2a3545;
    }
    #log {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.25rem;
      list-style: none;
      margin: 0;
      font-size: 0.9rem;
    }
    #log li { margin-bottom: 0.75rem; }
    #log li.user { text-align: right; }
    #log li.user .line {
      display: inline-block;
      max-width: 90%;
      text-align: left;
      background: #243047;
      padding: 0.55rem 0.75rem;
      border-radius: 10px;
      white-space: pre-wrap;
      line-height: 1.45;
    }
    #log li.assistant .line {
      display: block;
      max-width: 95%;
      background: #1e2a3d;
      border: 1px solid #2a3545;
      padding: 0.55rem 0.75rem;
      border-radius: 10px;
      white-space: pre-wrap;
      line-height: 1.45;
    }
    #log li.system { color: var(--muted); font-size: 0.72rem; font-family: ui-monospace, Consolas, monospace; }
    #log li.error { color: #fca5a5; font-size: 0.85rem; }

    #debug-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      height: 100%;
      overflow: hidden;
      background: #121922;
    }
    #debug-scroll {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-gutter: stable;
    }
    #debug-scroll::-webkit-scrollbar {
      width: 8px;
    }
    #debug-scroll::-webkit-scrollbar-thumb {
      background: #3d4f66;
      border-radius: 4px;
    }
    #debug-scroll::-webkit-scrollbar-track {
      background: #121922;
    }
    .debug-header {
      padding: 0.65rem 0.85rem;
      border-bottom: 1px solid #2a3545;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .debug-header h2 { margin: 0; font-size: 0.85rem; font-weight: 600; color: var(--muted); }
    .debug-header button {
      padding: 0.3rem 0.55rem;
      border-radius: 6px;
      border: 1px solid #2a3545;
      background: var(--accent);
      color: #fff;
      font-size: 0.72rem;
      cursor: pointer;
    }
    #server-state-wrap {
      padding: 0.65rem 0.85rem;
      border-bottom: 1px solid #2a3545;
      flex-shrink: 0;
    }
    #server-state-wrap .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }
    #server-state {
      margin: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem 0.5rem;
      font-size: 0.72rem;
      line-height: 1.4;
    }
    .debug-chip {
      display: inline-block;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      border: 1px solid #2a3545;
      background: var(--panel);
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }
    .debug-chip.muted { color: var(--muted); }
    .debug-chip.warn { border-color: #b45309; color: #fde68a; }
    .debug-chip.err { border-color: #991b1b; color: #fca5a5; }
    #debug-log {
      list-style: none;
      margin: 0;
      padding: 0.75rem 0.85rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }
    .debug-entry {
      flex-shrink: 0;
      border: 1px solid #3d4f66;
      border-radius: 10px;
      background: var(--panel);
      overflow: hidden;
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.25);
    }
    .debug-entry-head {
      padding: 0.5rem 0.65rem;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      border-bottom: 1px solid #2a3545;
      background: #121922;
      font-family: ui-monospace, Consolas, monospace;
      line-height: 1.4;
    }
    .debug-entry-body {
      padding: 0.55rem 0.65rem 0.65rem;
      font-size: 0.72rem;
      line-height: 1.5;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .debug-row {
      margin: 0;
      padding: 0.45rem 0.5rem;
      word-break: break-word;
      background: #121922;
      border: 1px solid #2a3545;
      border-radius: 6px;
    }
    .debug-row .k {
      display: block;
      color: var(--muted);
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin: 0 0 0.25rem;
    }
    .debug-row.trace {
      font-family: ui-monospace, Consolas, monospace;
      font-size: 0.68rem;
      color: #93c5fd;
    }
    .debug-entry details.raw {
      margin: 0.15rem 0 0;
      padding: 0.35rem 0.5rem;
      font-size: 0.65rem;
      background: #121922;
      border: 1px dashed #2a3545;
      border-radius: 6px;
    }
    .debug-entry details.raw summary {
      cursor: pointer;
      color: var(--muted);
    }
    .debug-entry details.raw pre {
      margin: 0.35rem 0 0;
      padding: 0.4rem;
      background: #121922;
      border: 1px solid #2a3545;
      border-radius: 4px;
      font-size: 0.62rem;
      max-height: 120px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .schedule-display { margin-top: 0.5rem; }
    .schedule-display-title {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      margin: 0 0 0.4rem;
    }
    .cal-grid { display: flex; flex-direction: column; gap: 0.4rem; }
    .cal-day {
      display: grid;
      grid-template-columns: 6.5rem 1fr;
      gap: 0.35rem 0.5rem;
      background: #121922;
      border: 1px solid #2a3545;
      border-radius: 8px;
      padding: 0.45rem 0.55rem;
    }
    .cal-day-weekday { font-weight: 600; font-size: 0.8rem; }
    .cal-day-num { font-size: 0.72rem; color: var(--muted); }
    .cal-slot {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.4rem;
      font-size: 0.78rem;
      padding: 0.3rem 0.4rem;
      background: #1a2332;
      border-radius: 6px;
      border: 1px solid #2a3545;
    }
    .cal-slot-time { color: #93c5fd; white-space: nowrap; }
    #toolbar {
      padding: 0.5rem 1rem;
      border-top: 1px solid #2a3545;
      background: #121922;
    }
    #toolbar button {
      padding: 0.35rem 0.65rem;
      border-radius: 6px;
      border: 1px solid #2a3545;
      background: #243047;
      color: var(--text);
      font-size: 0.8rem;
      cursor: pointer;
    }
    #composer {
      display: flex;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      border-top: 1px solid #2a3545;
      background: #121922;
    }
    #composer textarea {
      flex: 1;
      min-height: 44px;
      max-height: 140px;
      padding: 0.5rem 0.65rem;
      border-radius: 8px;
      border: 1px solid #2a3545;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      resize: vertical;
    }
    #composer button {
      padding: 0 1rem;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    #composer button:disabled { opacity: 0.5; cursor: not-allowed; }
    #file-protocol-warn {
      display: none;
      padding: 0.75rem 1rem;
      background: #422006;
      color: #fde68a;
      font-size: 0.85rem;
    }
    @media (max-width: 800px) {
      main.layout { grid-template-columns: 1fr; grid-template-rows: 1fr min(42vh, 320px); }
      #debug-panel {
        max-height: none;
        min-height: 0;
        border-top: 1px solid #2a3545;
      }
      #chat-panel { border-right: none; }
    }

    #auth-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(15, 20, 25, 0.92);
      padding: 1rem;
    }
    #auth-screen.hidden { display: none; }
    .auth-card {
      width: min(400px, 100%);
      background: var(--panel);
      border: 1px solid #2a3545;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    .auth-card h2 { margin: 0 0 0.35rem; font-size: 1.25rem; }
    .auth-card p.sub { margin: 0 0 1rem; color: var(--muted); font-size: 0.85rem; }
    .auth-card label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 0.25rem; }
    .auth-card input {
      width: 100%;
      margin-bottom: 0.75rem;
      padding: 0.5rem 0.65rem;
      border-radius: 8px;
      border: 1px solid #2a3545;
      background: #121922;
      color: var(--text);
      font: inherit;
    }
    .auth-card button {
      width: 100%;
      padding: 0.55rem;
      margin-bottom: 0.5rem;
      border-radius: 8px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      font: inherit;
    }
    .auth-card button.primary { background: var(--accent); color: #fff; }
    .auth-card button.oauth { background: #243047; color: var(--text); border: 1px solid #2a3545; }
    .auth-card button.link {
      background: transparent;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 400;
    }
    .auth-divider {
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      margin: 0.75rem 0;
    }
    #auth-error { color: #fca5a5; font-size: 0.8rem; min-height: 1.2rem; margin-bottom: 0.5rem; }
    #auth-status { color: var(--muted); font-size: 0.8rem; margin-bottom: 0.5rem; }
    #user-chip {
      font-size: 0.75rem;
      color: var(--muted);
      max-width: 12rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #btn-signout {
      padding: 0.25rem 0.5rem;
      border-radius: 6px;
      border: 1px solid #2a3545;
      background: transparent;
      color: var(--muted);
      font-size: 0.72rem;
      cursor: pointer;
    }
    #btn-signout.hidden { display: none; }

    #mode-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1.25rem;
      border-bottom: 1px solid #2a3545;
      background: #121922;
      flex-wrap: wrap;
    }
    #mode-bar .mode-bar-label {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-right: 0.25rem;
    }
    .mode-btn {
      padding: 0.35rem 0.75rem;
      border-radius: 8px;
      border: 1px solid #2a3545;
      background: #1a2332;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
    }
    .mode-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .mode-btn[data-mode="goal"].active {
      background: #059669;
      border-color: #059669;
    }
    #goal-plan-chip {
      font-size: 0.72rem;
      color: #6ee7b7;
      font-family: ui-monospace, Consolas, monospace;
      margin-left: auto;
    }
    #goal-plan-chip.hidden { display: none; }

    .goal-setup {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #2a3545;
      background: #121922;
    }
    .goal-setup.hidden { display: none; }
    .goal-setup h3 {
      margin: 0 0 0.5rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: #6ee7b7;
    }
    .goal-setup label {
      display: block;
      font-size: 0.72rem;
      color: var(--muted);
      margin-bottom: 0.2rem;
    }
    .goal-setup input,
    .goal-setup textarea {
      width: 100%;
      margin-bottom: 0.5rem;
      padding: 0.45rem 0.6rem;
      border-radius: 8px;
      border: 1px solid #2a3545;
      background: var(--panel);
      color: var(--text);
      font: inherit;
    }
    .goal-setup .goal-actions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .goal-setup .goal-actions button {
      padding: 0.35rem 0.65rem;
      border-radius: 6px;
      border: 1px solid #2a3545;
      background: #059669;
      color: #fff;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
    }
    .goal-setup .goal-actions button.secondary {
      background: #243047;
      color: var(--text);
    }
    .auth-tabs {
      display: flex;
      gap: 0.35rem;
      margin-bottom: 1rem;
    }
    .auth-tabs button {
      flex: 1;
      padding: 0.45rem;
      border-radius: 8px;
      border: 1px solid #2a3545;
      background: #121922;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
    }
    .auth-tabs button.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .auth-panel.hidden { display: none; }
    .auth-hint {
      font-size: 0.72rem;
      color: var(--muted);
      margin: -0.35rem 0 0.75rem;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div id="auth-screen" class="hidden" aria-hidden="true">
    <div class="auth-card">
      <h2 id="auth-title">Welcome to TodAI</h2>
      <p class="sub">Sign in or create an account. Your calendar and chat are saved to your user in the database.</p>
      <div class="auth-tabs">
        <button type="button" id="auth-tab-signin" class="active">Sign in</button>
        <button type="button" id="auth-tab-signup">Create account</button>
      </div>
      <div id="auth-status"></div>
      <div id="auth-error"></div>

      <div id="auth-panel-signin" class="auth-panel">
        <label for="auth-username">Username</label>
        <input type="text" id="auth-username" autocomplete="username" placeholder="Same name you registered with" />
        <p class="auth-hint">You can also type your email here if you forgot your username.</p>
        <label for="auth-password">Password</label>
        <input type="password" id="auth-password" autocomplete="current-password" placeholder="Your password" />
        <button type="button" class="primary" id="btn-auth-signin">Sign in</button>
      </div>

      <div id="auth-panel-signup" class="auth-panel hidden">
        <label for="auth-name">Your name (username)</label>
        <input type="text" id="auth-name" autocomplete="name" placeholder="e.g. Ali Khan — use this to sign in" />
        <label for="auth-email-signup">Email</label>
        <input type="text" id="auth-email-signup" autocomplete="email" placeholder="any format you like" />
        <label for="auth-password-signup">Password</label>
        <input type="password" id="auth-password-signup" autocomplete="new-password" placeholder="Choose a password" />
        <button type="button" class="primary" id="btn-auth-create">Create account</button>
      </div>

      <div class="auth-divider">or continue with</div>
      <button type="button" class="oauth" id="btn-auth-google">Google</button>
      <button type="button" class="oauth" id="btn-auth-apple">Apple</button>
    </div>
  </div>
  <div id="file-protocol-warn"></div>
  <header>
    <h1>TodAI</h1>
    <span id="user-chip" title=""></span>
    <button type="button" id="btn-signout" class="hidden" title="Sign out">Sign out</button>
    <div id="state-bar">
      <span id="state-pill" class="state-pill state-idle" title="Orchestrator FSM">idle</span>
      <span id="usage-pill" title="Groq API usage">—</span>
      <span id="status-meta">—</span>
    </div>
  </header>
  <div id="mode-bar" role="tablist" aria-label="Agent mode">
    <span class="mode-bar-label">Mode</span>
    <button type="button" class="mode-btn active" data-mode="calendar" role="tab" aria-selected="true">Calendar agent</button>
    <button type="button" class="mode-btn" data-mode="goal" role="tab" aria-selected="false">Goal planner</button>
    <span id="goal-plan-chip" class="hidden" title="Active goal plan id"></span>
  </div>
  <main class="layout">
    <section id="chat-panel">
      <div id="goal-setup" class="goal-setup hidden" aria-label="Start a goal plan">
        <h3>New 7-day goal plan</h3>
        <label for="goal-title">Goal title</label>
        <input type="text" id="goal-title" placeholder="e.g. Learn Python basics" />
        <label for="goal-desc">Description (optional)</label>
        <textarea id="goal-desc" rows="2" placeholder="What you want to achieve this week"></textarea>
        <div class="goal-actions">
          <button type="button" id="btn-goal-start">Start plan</button>
          <button type="button" id="btn-goal-new" class="secondary hidden">New plan</button>
        </div>
      </div>
      <ul id="log" aria-live="polite"></ul>
      <div id="toolbar">
        <button type="button" id="btn-reset">Reset data</button>
      </div>
      <form id="composer">
        <textarea id="msg" placeholder="Message… Enter to send"></textarea>
        <button type="submit" id="send">Send</button>
      </form>
    </section>
    <aside id="debug-panel" aria-label="Debug panel">
      <div class="debug-header">
        <h2>Debug log</h2>
        <button type="button" id="btn-copy-log" title="Copy all entries">Copy all</button>
      </div>
      <div id="server-state-wrap">
        <div class="label">Server state</div>
        <div id="server-state" aria-live="polite"></div>
      </div>
      <div id="debug-scroll">
        <ul id="debug-log"></ul>
      </div>
    </aside>
  </main>
  <script src="/static/calendar-render.js"></script>
  <script src="/static/auth.js"></script>
  <script>
    let userId = "default";
    let appReady = false;
    const isFileProtocol = location.protocol === "file:";
    const API_BASE = isFileProtocol ? "" : location.origin;
    const logEl = document.getElementById("log");
    const debugLogEl = document.getElementById("debug-log");
    const serverStateEl = document.getElementById("server-state");
    const statePill = document.getElementById("state-pill");
    const usagePill = document.getElementById("usage-pill");
    const statusMeta = document.getElementById("status-meta");
    const fileWarn = document.getElementById("file-protocol-warn");
    let lastChatApiUsage = null;
    let rateLimitUntil = 0;
    let rateLimitTimer = null;
    let usageRefreshTimer = null;

    const MODE_LABELS = {
      chat: "Chat",
      schedule_qa: "Schedule",
      schedule_write: "Calendar edit",
      goal_plan: "Goal planner",
      goal_interrogate: "Goal Q&A",
      goal_confirm: "Goal confirm",
      goal_create: "Goal create",
      goal_schedule_read: "Goal calendar",
      goal_goals_list: "Goal list",
      goal_delete: "Goal delete",
      goal_edit: "Goal edit",
      goal_chat: "Goal chat",
    };
    const APP_MODE_KEY = "todai_app_mode";
    const goalPlanKey = function () {
      return "todai_goal_plan_id_" + (userId || "default");
    };
    let appMode = "calendar";
    let goalPlanId = null;

    const STATE_HINTS = {
      idle: "Ready for a new message.",
      analyzing: "Router / specialist running.",
      requesting_data: "Loading calendar from disk.",
      error: "Last turn failed — send again.",
    };

    function apiUrl(path) {
      return API_BASE + path;
    }

    function nowLabel() {
      return new Date().toLocaleString();
    }

    function setStatePill(state) {
      const st = state || "idle";
      statePill.textContent = st;
      statePill.className = "state-pill state-" + String(st).replace(/_/g, "-");
      statePill.title = STATE_HINTS[st] || st;
    }

    function getApiUsage(j) {
      if (!j) return null;
      return j.api_usage || (j.debug && j.debug.api_usage) || null;
    }

    function secondsUntilRateLimit() {
      if (!rateLimitUntil) return 0;
      return Math.max(0, Math.ceil((rateLimitUntil - Date.now()) / 1000));
    }

    function applyRateLimitCooldown(u) {
      if (!u || !u.rate_limited) return;
      const wait = Number(u.retry_after_seconds) || 5;
      rateLimitUntil = Date.now() + wait * 1000;
      startRateLimitCountdown();
    }

    function startRateLimitCountdown() {
      if (rateLimitTimer) clearInterval(rateLimitTimer);
      function tick() {
        const left = secondsUntilRateLimit();
        const sendBtn = document.getElementById("send");
        const ta = document.getElementById("msg");
        if (left > 0) {
          sendBtn.disabled = true;
          ta.disabled = true;
          sendBtn.textContent = "Wait " + left + "s";
          usagePill.textContent = "Rate limit · " + left + "s";
          usagePill.className = "usage-hot";
        } else {
          sendBtn.disabled = false;
          ta.disabled = false;
          sendBtn.textContent = "Send";
          rateLimitUntil = 0;
          clearInterval(rateLimitTimer);
          rateLimitTimer = null;
          refreshStatus().catch(function () {});
        }
      }
      tick();
      rateLimitTimer = setInterval(tick, 500);
    }

    function setUsagePill(j) {
      if (secondsUntilRateLimit() > 0) return;
      let u = getApiUsage(j);
      if (u && u.turn_requests > 0) lastChatApiUsage = u;
      if (u && (!u.turn_requests || u.turn_requests === 0) && lastChatApiUsage) {
        u = Object.assign({}, u, {
          turn_requests: lastChatApiUsage.turn_requests,
          turn_phases: lastChatApiUsage.turn_phases,
          turn_tokens: lastChatApiUsage.turn_tokens,
        });
      }
      if (!u) {
        usagePill.textContent = "—";
        usagePill.className = "";
        usagePill.title = "Groq free tier: RPM, TPM, RPD, TPD";
        return;
      }
      applyRateLimitCooldown(u);
      if (secondsUntilRateLimit() > 0) return;
      const turn = u.turn_requests != null ? u.turn_requests : 0;
      const rpmU = u.rpm_used != null ? u.rpm_used : 0;
      const rpmL = u.rpm_limit != null ? u.rpm_limit : "?";
      const tpmU = u.tpm_used != null ? u.tpm_used : 0;
      const tpmL = u.tpm_limit != null ? u.tpm_limit : "?";
      const resetSec = u.minute_resets_in_sec != null ? Math.ceil(u.minute_resets_in_sec) : null;
      const tpmOver = u.tpm_over_limit && tpmU > tpmL;
      let pill =
        turn + " req/msg · RPM " + rpmU + "/" + rpmL + " · TPM " + tpmU + "/" + tpmL;
      if (resetSec != null && resetSec > 0 && resetSec < 60) {
        pill += " · resets " + resetSec + "s";
      }
      usagePill.textContent = pill;
      const phases = (u.turn_phases || []).join(", ");
      usagePill.title =
        "This message: " +
        turn +
        " Groq calls" +
        (phases ? " (" + phases + ")" : "") +
        "\nMinute: RPM " +
        rpmU +
        "/" +
        rpmL +
        ", TPM " +
        tpmU +
        "/" +
        tpmL +
        "\nDay: RPD " +
        (u.rpd_used != null ? u.rpd_used : "?") +
        "/" +
        (u.rpd_limit != null ? u.rpd_limit : "?") +
        ", TPD " +
        (u.tpd_used != null ? u.tpd_used : "?") +
        "/" +
        (u.tpd_limit != null ? u.tpd_limit : "?") +
        (resetSec != null ? "\nCurrent minute resets in " + resetSec + "s (wall clock)." : "");
      usagePill.className = "";
      if (tpmOver || (rpmL !== "?" && rpmU >= rpmL)) usagePill.className = "usage-hot";
      else if (rpmL !== "?" && rpmU >= rpmL * 0.85) usagePill.className = "usage-warn";
      else if (tpmL !== "?" && tpmU >= tpmL * 0.85) usagePill.className = "usage-warn";
    }

    function startUsageRefreshPoll() {
      if (usageRefreshTimer) clearInterval(usageRefreshTimer);
      usageRefreshTimer = setInterval(function () {
        if (isFileProtocol || !appReady || secondsUntilRateLimit() > 0) return;
        refreshStatus().catch(function () {});
      }, 3000);
    }

    function setMetaFromPayload(j) {
      const mode = j.agent_mode || j.last_agent_mode || (appMode === "goal" ? "goal_plan" : "");
      const planner = j.planner || (j.debug && j.debug.planner) || "—";
      const route = (j.debug && (j.debug.intent || j.debug.route)) || "";
      const phase = j.phase || (j.debug && j.debug.phase) || "";
      const parts = [];
      if (appMode === "goal") parts.push("Goal planner");
      else if (mode) parts.push(MODE_LABELS[mode] || mode);
      if (phase) parts.push("phase " + phase);
      if (route && route !== "goal_plan") parts.push(route);
      if (planner && planner !== "goal_stub") parts.push(planner);
      else if (appMode === "goal") parts.push("goal_stub");
      statusMeta.textContent = parts.join(" · ") || "—";
      if (appMode === "calendar") setUsagePill(j);
      else if (secondsUntilRateLimit() <= 0) {
        usagePill.textContent = goalPlanId ? "plan " + goalPlanId.slice(0, 8) + "…" : "no plan";
        usagePill.className = "";
        usagePill.title = "Goal planner mode — Groq usage shown for calendar agent only";
      }
    }

    function slimServerState(j) {
      if (!j || typeof j !== "object") return {};
      const u = j.api_usage || {};
      const out = {
        state: j.state,
        mode: j.agent_mode || j.last_agent_mode || (appMode === "goal" ? "goal_plan" : undefined),
        planner: j.planner || (j.debug && j.debug.planner),
        pipeline: j.pipeline || (appMode === "goal" ? "goal_planner" : undefined),
        schedule_v: j.schedule_version,
      };
      if (j.phase) out.phase = j.phase;
      if (j.plan_id) out.plan = String(j.plan_id).slice(0, 8);
      if (appMode === "goal") out.ui_mode = "goal";
      if (j.pending_proposal_id) out.pending = j.pending_proposal_id;
      if (u.turn_requests != null || u.rpm_used != null) {
        out.groq =
          (u.turn_requests != null ? u.turn_requests + " req" : "") +
          (u.turn_tokens != null ? " · " + u.turn_tokens + " tok" : "") +
          (u.rpm_used != null ? " · RPM " + u.rpm_used + "/" + (u.rpm_limit || "?") : "");
      }
      if (u.rate_limited) out.rate_limited = true;
      const idx = j.storage_index;
      if (idx && idx.calendar_files && idx.calendar_files.length) {
        out.calendars = idx.calendar_files.map(function (c) {
          return (c.month || "?") + "(" + (c.block_count != null ? c.block_count : "?") + ")";
        }).join(", ");
      }
      if (idx && idx.server_date_utc) out.today = idx.server_date_utc;
      return out;
    }

    function renderServerStateChips(slim) {
      serverStateEl.innerHTML = "";
      Object.keys(slim).forEach(function (key) {
        const chip = document.createElement("span");
        chip.className = "debug-chip" + (key === "rate_limited" ? " warn" : key === "state" && slim.state === "error" ? " err" : "");
        const val = slim[key];
        chip.textContent = key + ": " + (val === true ? "yes" : String(val));
        serverStateEl.appendChild(chip);
      });
      if (!serverStateEl.childElementCount) {
        const chip = document.createElement("span");
        chip.className = "debug-chip muted";
        chip.textContent = "—";
        serverStateEl.appendChild(chip);
      }
    }

    function setServerStateSnapshot(obj) {
      renderServerStateChips(slimServerState(obj));
    }

    function truncate(s, n) {
      const t = String(s || "").trim();
      if (t.length <= n) return t;
      return t.slice(0, n) + "…";
    }

    function summarizeToolTrace(trace) {
      if (!trace || !trace.length) return "";
      const parts = [];
      trace.forEach(function (step) {
        if (!step || !step.phase) return;
        const p = step.phase;
        if (p === "date_anchor") {
          let s = "anchor " + (step.today || "");
          if (step.mentioned_weekdays) {
            const w = Object.entries(step.mentioned_weekdays)
              .map(function (e) { return e[0] + "→" + e[1]; })
              .join(", ");
            if (w) s += " · " + w;
          }
          parts.push(s);
        } else if (p === "router") {
          parts.push("router→" + (step.route || "?") + (step.tools && step.tools.length ? " +" + step.tools.length + " tool" : ""));
        } else if (p === "time_scope") {
          parts.push("scope " + (step.label || step.from + "…" + step.to));
        } else if (p === "intent") {
          parts.push("intent " + (step.intent || ""));
        } else if (p === "specialist") {
          parts.push("specialist" + (step.operation_count != null ? " ops=" + step.operation_count : ""));
        } else if (p === "direct_apply") {
          parts.push("apply months=" + (step.months_written != null ? step.months_written : 0));
        } else if (p === "prefetch") {
          const n = (step.calls && step.calls.length) || 0;
          parts.push("prefetch " + n + (step.errors && step.errors.length ? " ERR" : ""));
        } else if (p === "rate_limit") {
          parts.push("RATE LIMIT " + (step.limit_hit || ""));
        } else if (p === "prompt_bundle") {
          /* skip — noisy */
        } else {
          parts.push(p);
        }
      });
      return parts.join(" → ");
    }

    function summarizeScheduleDisplay(sd) {
      if (!sd) return "";
      if (sd.empty) return (sd.title || "Schedule") + " (empty)";
      const period = sd.period;
      const p = period ? period.from + "–" + period.to : "";
      const days = (sd.days || []).filter(function (d) { return d.slots && d.slots.length; }).length;
      return (sd.title || "Schedule") + (p ? " · " + p : "") + " · " + days + " day(s) with events";
    }

    function summarizeApiUsage(u) {
      if (!u) return "";
      const bits = [];
      if (u.turn_requests != null) bits.push(u.turn_requests + " req");
      if (u.turn_tokens != null) bits.push(u.turn_tokens + " tok");
      if (u.rpm_used != null) bits.push("RPM " + u.rpm_used + "/" + (u.rpm_limit || "?"));
      if (u.rate_limited) bits.push("LIMITED");
      return bits.join(" · ");
    }

    function buildDebugSummary(endpoint, j, userMessage) {
      const dbg = j.debug || {};
      const route = dbg.intent || dbg.route || "";
      const summary = {
        endpoint: endpoint,
        state: j.state,
        route: route,
        mode: j.agent_mode || j.agent_state,
        user: userMessage ? truncate(userMessage, 80) : undefined,
        reply: truncate(j.assistant_text || j.reply_text, 100),
        groq: summarizeApiUsage(getApiUsage(j)),
        trace: summarizeToolTrace(j.tool_trace),
        schedule: summarizeScheduleDisplay(j.schedule_display),
        errors: [],
      };
      (j.validator_errors || []).forEach(function (e) {
        summary.errors.push((e.code || "err") + (e.detail ? ": " + truncate(e.detail, 60) : ""));
      });
      if (dbg.router_groq && dbg.router_groq.ok === false) summary.errors.push("router failed");
      if (dbg.specialist_groq && dbg.specialist_groq.ok === false) summary.errors.push("specialist failed");
      const prefetch = (j.tool_trace || []).find(function (s) { return s.phase === "prefetch"; });
      if (prefetch && prefetch.errors && prefetch.errors.length) summary.errors.push("prefetch " + prefetch.errors.length);
      if (endpoint === "reset" && dbg.message) summary.reset = dbg.message;
      return summary;
    }

    function addDebugRow(body, label, text, className) {
      if (!text) return;
      const row = document.createElement("div");
      row.className = "debug-row" + (className ? " " + className : "");
      const k = document.createElement("span");
      k.className = "k";
      k.textContent = label;
      row.appendChild(k);
      row.appendChild(document.createTextNode(text));
      body.appendChild(row);
    }

    function appendDebugBlock(endpoint, j, userMessage) {
      const st = j.state || "idle";
      const route = (j.debug && (j.debug.intent || j.debug.route)) || "";
      const head =
        nowLabel() +
        " · " +
        endpoint +
        " · " +
        st +
        (route ? " · " + route : "") +
        (j.agent_mode ? " · " + j.agent_mode : "");

      const summary = buildDebugSummary(endpoint, j, userMessage);
      const li = document.createElement("li");
      li.className = "debug-entry";
      const headEl = document.createElement("div");
      headEl.className = "debug-entry-head";
      headEl.textContent = head;
      li.appendChild(headEl);

      const body = document.createElement("div");
      body.className = "debug-entry-body";
      addDebugRow(body, "User", summary.user);
      addDebugRow(body, "Reply", summary.reply);
      addDebugRow(body, "Groq", summary.groq);
      addDebugRow(body, "Trace", summary.trace, "trace");
      addDebugRow(body, "Cal", summary.schedule);
      if (summary.reset) addDebugRow(body, "Reset", summary.reset);
      if (summary.errors.length) addDebugRow(body, "Err", summary.errors.join("; "), "trace");

      const details = document.createElement("details");
      details.className = "raw";
      const sum = document.createElement("summary");
      sum.textContent = "Raw JSON";
      details.appendChild(sum);
      const pre = document.createElement("pre");
      pre.textContent = JSON.stringify(
        {
          state: j.state,
          route: route,
          agent_mode: j.agent_mode,
          tool_trace: j.tool_trace,
          api_usage: getApiUsage(j),
          validator_errors: j.validator_errors,
          debug: j.debug,
        },
        null,
        2
      );
      details.appendChild(pre);
      body.appendChild(details);
      li.appendChild(body);

      debugLogEl.appendChild(li);
      const scrollEl = document.getElementById("debug-scroll");
      if (scrollEl) scrollEl.scrollTop = scrollEl.scrollHeight;
    }

    function applyServerState(j) {
      if (j && j.state != null) setStatePill(j.state);
      setMetaFromPayload(j || {});
    }

    function appendChatLog(kind, text, extras) {
      const li = document.createElement("li");
      li.className = kind;
      if (kind === "system" || kind === "error") {
        li.textContent = text;
      } else {
        const line = document.createElement("div");
        line.className = "line";
        line.textContent = text || "";
        li.appendChild(line);
        if (extras && extras.scheduleDisplay && typeof renderScheduleDisplay === "function") {
          li.appendChild(renderScheduleDisplay(extras.scheduleDisplay, { hideTitle: !!text }));
        }
      }
      logEl.appendChild(li);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function appendAssistantResponse(j, userMessage, endpoint) {
      if (getApiUsage(j)) lastChatApiUsage = getApiUsage(j);
      applyServerState(j);
      const reply = (j.reply_text || j.assistant_text || "").trim();
      if (reply) {
        appendChatLog("assistant", reply, {
          scheduleDisplay: j.schedule_display || null,
        });
      } else if (j.schedule_display) {
        appendChatLog("assistant", "", { scheduleDisplay: j.schedule_display });
      }
      appendDebugBlock(endpoint || (isGoalMode() ? "goal-plan/message" : "chat"), j, userMessage);
    }

    function setBusy(busy) {
      if (secondsUntilRateLimit() > 0) return;
      document.getElementById("send").disabled = busy;
      document.getElementById("msg").disabled = busy;
      if (busy) {
        setStatePill("analyzing");
        statusMeta.textContent = "Thinking…";
        usagePill.textContent = "…";
        usagePill.className = "";
      }
    }

    function apiHeaders(extra) {
      const base =
        typeof TodaiAuth !== "undefined" && TodaiAuth.authHeaders
          ? TodaiAuth.authHeaders(extra)
          : Object.assign({ "Content-Type": "application/json" }, extra || {});
      return base;
    }

    async function fetchJson(url, options, timeoutMs) {
      const ms = timeoutMs || 120000;
      const ctrl = new AbortController();
      const t = setTimeout(() => ctrl.abort(), ms);
      const opts = options || {};
      opts.headers = apiHeaders(opts.headers);
      try {
        const r = await fetch(url, { ...opts, signal: ctrl.signal });
        if (r.status === 401) {
          return {
            assistant_text: "Session expired — please sign in again.",
            state: "error",
            debug: { error: "unauthorized" },
          };
        }
        const raw = await r.text();
        try {
          return JSON.parse(raw);
        } catch {
          return {
            assistant_text: "Bad response (not JSON). HTTP " + r.status,
            state: "error",
            debug: { error: "non_json", status: r.status },
          };
        }
      } catch (err) {
        if (err.name === "AbortError") {
          return { assistant_text: "Timed out — try again.", state: "error", debug: { error: "timeout" } };
        }
        throw err;
      } finally {
        clearTimeout(t);
      }
    }

    function isGoalMode() {
      return appMode === "goal";
    }

    function syncModeChrome() {
      document.querySelectorAll(".mode-btn").forEach(function (btn) {
        const on = btn.getAttribute("data-mode") === appMode;
        btn.classList.toggle("active", on);
        btn.setAttribute("aria-selected", on ? "true" : "false");
      });
      const goalSetup = document.getElementById("goal-setup");
      const planChip = document.getElementById("goal-plan-chip");
      const btnNew = document.getElementById("btn-goal-new");
      const ta = document.getElementById("msg");
      if (isGoalMode()) {
        goalSetup.classList.toggle("hidden", !!goalPlanId);
        btnNew.classList.toggle("hidden", !goalPlanId);
        if (goalPlanId) {
          planChip.textContent = "plan " + goalPlanId.slice(0, 8) + "…";
          planChip.classList.remove("hidden");
          planChip.title = goalPlanId;
        } else {
          planChip.classList.add("hidden");
        }
        ta.placeholder = goalPlanId
          ? "Answer the goal agent… Enter to send"
          : "Start a plan above, or use Start plan";
        document.getElementById("btn-reset").title = "Resets calendar only (switch to Calendar mode)";
      } else {
        goalSetup.classList.add("hidden");
        planChip.classList.add("hidden");
        ta.placeholder = "Message… Enter to send";
        document.getElementById("btn-reset").title = "";
      }
      try {
        sessionStorage.setItem(APP_MODE_KEY, appMode);
        if (goalPlanId) sessionStorage.setItem(goalPlanKey(), goalPlanId);
        else sessionStorage.removeItem(goalPlanKey());
      } catch (e) { /* ignore */ }
    }

    function setAppMode(mode) {
      if (mode !== "calendar" && mode !== "goal") return;
      appMode = mode;
      syncModeChrome();
      if (appReady) {
        if (isGoalMode()) refreshGoalStatus().catch(function () { setStatePill("idle"); });
        else refreshStatus().catch(function () { setStatePill("idle"); });
      }
    }

    function loadGoalPlanFromStorage() {
      try {
        goalPlanId = sessionStorage.getItem(goalPlanKey()) || null;
        const savedMode = sessionStorage.getItem(APP_MODE_KEY);
        if (savedMode === "goal" || savedMode === "calendar") appMode = savedMode;
      } catch (e) {
        goalPlanId = null;
      }
    }

    function renderGoalMessages(messages) {
      logEl.innerHTML = "";
      (messages || []).forEach(function (m) {
        if (!m || !m.content) return;
        appendChatLog(m.role === "user" ? "user" : "assistant", m.content);
      });
    }

    async function refreshGoalStatus() {
      if (isFileProtocol || !appReady) return;
      if (!goalPlanId) {
        setStatePill("idle");
        setMetaFromPayload({ agent_mode: "goal_plan", phase: "no_plan", debug: { route: "goal_plan" } });
        setServerStateSnapshot({ ui_mode: "goal", mode: "goal_plan", phase: "no_plan", state: "idle" });
        return;
      }
      const j = await fetchJson(
        apiUrl("/api/goals/plan/" + encodeURIComponent(goalPlanId)),
        {},
        15000
      );
      applyServerState(j);
      setServerStateSnapshot(j);
    }

    async function refreshStatus() {
      if (isFileProtocol || !appReady) return;
      if (isGoalMode()) {
        await refreshGoalStatus();
        return;
      }
      const j = await fetchJson(
        apiUrl("/api/state?user_id=" + encodeURIComponent(userId)),
        {},
        15000
      );
      applyServerState(j);
      setServerStateSnapshot(j);
    }

    async function startGoalPlan() {
      const title = document.getElementById("goal-title").value.trim();
      if (!title) {
        appendChatLog("system", "Enter a goal title first.");
        return;
      }
      const description = document.getElementById("goal-desc").value.trim();
      setBusy(true);
      try {
        const j = await fetchJson(apiUrl("/api/goals/plan/start"), {
          method: "POST",
          body: JSON.stringify({ title: title, description: description }),
        });
        if (!j.plan_id) {
          appendChatLog("error", (j.detail || j.assistant_text || "Start failed") + "");
          appendDebugBlock("goal-plan/start", j, title);
          return;
        }
        goalPlanId = j.plan_id;
        syncModeChrome();
        logEl.innerHTML = "";
        appendAssistantResponse(j, title);
        await refreshGoalStatus();
        const st = await fetchJson(
          apiUrl("/api/goals/plan/" + encodeURIComponent(goalPlanId)),
          {},
          15000
        );
        renderGoalMessages(st.messages);
      } catch (err) {
        setStatePill("error");
        appendChatLog("error", "Start plan failed: " + err);
      } finally {
        setBusy(false);
      }
    }

    function clearGoalPlan() {
      goalPlanId = null;
      logEl.innerHTML = "";
      document.getElementById("goal-title").value = "";
      document.getElementById("goal-desc").value = "";
      syncModeChrome();
      refreshGoalStatus().catch(function () {});
    }

    function copyAllDebugLog() {
      const entries = debugLogEl.querySelectorAll(".debug-entry");
      if (!entries.length) {
        alert("No debug entries yet.");
        return;
      }
      const chips = Array.from(serverStateEl.querySelectorAll(".debug-chip"))
        .map(function (c) { return c.textContent; })
        .join(" · ");
      const serverSnap = "=== server === " + (chips || "—") + "\n\n";
      const blocks = Array.from(entries).map(function (li) {
        const head = li.querySelector(".debug-entry-head");
        const rows = li.querySelectorAll(".debug-entry-body .debug-row");
        const lines = Array.from(rows).map(function (r) { return r.textContent.trim(); });
        const raw = li.querySelector("details.raw pre");
        let text = "=== " + (head ? head.textContent : "entry") + " ===\n" + lines.join("\n");
        if (raw) text += "\n\n" + raw.textContent;
        return text;
      });
      const text = serverSnap + blocks.join("\n\n");
      navigator.clipboard.writeText(text).then(
        function () {
          appendChatLog("system", "Copied " + entries.length + " debug entries.");
        },
        function () {
          prompt("Copy debug log:", text);
        }
      );
    }

    if (isFileProtocol) {
      fileWarn.style.display = "block";
      fileWarn.textContent = "Open http://127.0.0.1:8000/ (run python main.py) — not this file directly.";
      document.getElementById("send").disabled = true;
    } else {
      document.getElementById("send").disabled = true;
      document.getElementById("msg").disabled = true;
    }

    document.getElementById("btn-copy-log").addEventListener("click", copyAllDebugLog);

    document.getElementById("msg").addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        if (!isFileProtocol) document.getElementById("composer").requestSubmit();
      }
    });

    document.querySelectorAll(".mode-btn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        setAppMode(btn.getAttribute("data-mode"));
      });
    });
    document.getElementById("btn-goal-start").addEventListener("click", startGoalPlan);
    document.getElementById("btn-goal-new").addEventListener("click", function () {
      if (goalPlanId && !confirm("Start a new goal plan? Chat for the current plan stays in the database.")) return;
      clearGoalPlan();
    });

    document.getElementById("composer").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (isFileProtocol || !appReady) return;
      const waitLeft = secondsUntilRateLimit();
      if (!isGoalMode() && waitLeft > 0) {
        appendChatLog("system", "Please wait " + waitLeft + "s — Groq rate limit.");
        return;
      }
      const ta = document.getElementById("msg");
      const text = ta.value.trim();
      if (!text) return;
      if (isGoalMode() && !goalPlanId) {
        appendChatLog("system", "Click Start plan above before chatting.");
        return;
      }
      appendChatLog("user", text);
      setStatePill("analyzing");
      ta.value = "";
      setBusy(true);
      try {
        let j;
        if (isGoalMode()) {
          j = await fetchJson(apiUrl("/api/goals/plan/message"), {
            method: "POST",
            body: JSON.stringify({ plan_id: goalPlanId, message: text }),
          });
          appendAssistantResponse(j, text, "goal-plan/message");
        } else {
          j = await fetchJson(apiUrl("/api/chat"), {
            method: "POST",
            body: JSON.stringify({ user_id: userId, message: text }),
          });
          appendAssistantResponse(j, text, "chat");
          applyRateLimitCooldown(getApiUsage(j));
        }
        await refreshStatus();
      } catch (err) {
        setStatePill("error");
        appendChatLog("error", "Request failed: " + err);
        const ep = isGoalMode() ? "goal-plan/message" : "chat";
        appendDebugBlock(ep, { state: "error", agent_mode: isGoalMode() ? "goal_plan" : "", debug: { error: String(err) } }, text);
      } finally {
        setBusy(false);
        refreshStatus().catch(function () {});
      }
    });

    document.getElementById("btn-reset").addEventListener("click", async () => {
      if (!confirm("Reset calendar and clear chat?")) return;
      try {
        const r = await fetch(apiUrl("/api/reset"), {
          method: "POST",
          headers: apiHeaders(),
          body: JSON.stringify({ user_id: userId }),
        });
        const j = await r.json();
        logEl.innerHTML = "";
        debugLogEl.innerHTML = "";
        setStatePill("idle");
        appendDebugBlock("reset", { state: "idle", debug: j });
        await refreshStatus();
      } catch (err) {
        appendChatLog("error", "Reset failed: " + err);
      }
    });

    function showAuthScreen(show) {
      const el = document.getElementById("auth-screen");
      el.classList.toggle("hidden", !show);
      el.setAttribute("aria-hidden", show ? "false" : "true");
    }

    function setAuthError(msg) {
      document.getElementById("auth-error").textContent = msg || "";
    }

    function setAuthStatus(msg) {
      document.getElementById("auth-status").textContent = msg || "";
    }

    function updateUserChrome(authCtx) {
      const chip = document.getElementById("user-chip");
      const btnOut = document.getElementById("btn-signout");
      if (authCtx && authCtx.authRequired && authCtx.user) {
        chip.textContent = TodaiAuth.userLabel();
        chip.title = authCtx.user.email || userId;
        btnOut.classList.remove("hidden");
      } else if (!authCtx || !authCtx.authRequired) {
        chip.textContent = "local · " + userId;
        btnOut.classList.add("hidden");
      }
    }

    function setAuthTab(mode) {
      const signIn = mode === "signin";
      document.getElementById("auth-tab-signin").classList.toggle("active", signIn);
      document.getElementById("auth-tab-signup").classList.toggle("active", !signIn);
      document.getElementById("auth-panel-signin").classList.toggle("hidden", !signIn);
      document.getElementById("auth-panel-signup").classList.toggle("hidden", signIn);
      document.getElementById("auth-title").textContent = signIn ? "Sign in" : "Create account";
      setAuthError("");
    }

    function finishLogin(onSuccess) {
      userId = TodaiAuth.userId();
      if (!userId) {
        setAuthError("Sign-in succeeded but user id is missing. Try again.");
        return;
      }
      appReady = true;
      document.getElementById("send").disabled = false;
      document.getElementById("msg").disabled = false;
      showAuthScreen(false);
      setAuthStatus("");
      onSuccess();
    }

    function wireAuthForm(onSuccess) {
      document.getElementById("auth-tab-signin").onclick = function () {
        setAuthTab("signin");
      };
      document.getElementById("auth-tab-signup").onclick = function () {
        setAuthTab("signup");
      };

      document.getElementById("btn-auth-signin").onclick = async function () {
        setAuthError("");
        const username = document.getElementById("auth-username").value.trim();
        const password = document.getElementById("auth-password").value;
        if (!username || !password) {
          setAuthError("Enter username and password.");
          return;
        }
        setAuthStatus("Signing in…");
        try {
          await TodaiAuth.signInUsername(username, password);
          finishLogin(onSuccess);
        } catch (e) {
          setAuthStatus("");
          setAuthError(e.message || String(e));
        }
      };

      document.getElementById("btn-auth-create").onclick = async function () {
        setAuthError("");
        const name = document.getElementById("auth-name").value.trim();
        const email = document.getElementById("auth-email-signup").value.trim();
        const password = document.getElementById("auth-password-signup").value;
        if (!name) {
          setAuthError("Enter your name (username).");
          return;
        }
        if (!email) {
          setAuthError("Enter your email.");
          return;
        }
        if (!password) {
          setAuthError("Enter a password.");
          return;
        }
        setAuthStatus("Creating account…");
        try {
          await TodaiAuth.signUpAccount(name, email, password);
          setAuthStatus("Account created. Signing you in…");
          finishLogin(onSuccess);
        } catch (e) {
          setAuthStatus("");
          setAuthError(e.message || String(e));
        }
      };
      document.getElementById("btn-auth-google").onclick = function () {
        setAuthError("");
        TodaiAuth.signInOAuth("google").catch(function (e) {
          setAuthError(e.message || String(e));
        });
      };
      document.getElementById("btn-auth-apple").onclick = function () {
        setAuthError("");
        TodaiAuth.signInOAuth("apple").catch(function (e) {
          setAuthError(e.message || String(e));
        });
      };
    }

    document.getElementById("btn-signout").addEventListener("click", async function () {
      if (typeof TodaiAuth !== "undefined") await TodaiAuth.signOut();
      location.reload();
    });

    function onAppReady(authCtx) {
      userId = authCtx.userId || TodaiAuth.userId();
      loadGoalPlanFromStorage();
      syncModeChrome();
      updateUserChrome(authCtx);
      if (isGoalMode() && goalPlanId) {
        refreshGoalStatus()
          .then(function () {
            return fetchJson(apiUrl("/api/goals/plan/" + encodeURIComponent(goalPlanId)), {}, 15000);
          })
          .then(function (st) {
            renderGoalMessages(st.messages);
          })
          .catch(function () { setStatePill("idle"); });
      } else {
        refreshStatus().catch(function () { setStatePill("idle"); });
      }
      startUsageRefreshPoll();
    }

    async function startApp() {
      if (isFileProtocol) return;
      let authCtx;
      try {
        const cfg = await TodaiAuth.loadConfig();
        if (cfg.auth_required) showAuthScreen(true);
        authCtx = await TodaiAuth.prepare(setAuthStatus);
      } catch (e) {
        setAuthError(String(e));
        showAuthScreen(true);
        return;
      }
      if (authCtx.needsLogin) {
        if (authCtx.bootstrapError) {
          setAuthError("Session expired — please sign in again. (" + authCtx.bootstrapError + ")");
        }
        setAuthTab("signin");
        wireAuthForm(function () {
          onAppReady({
            authRequired: true,
            userId: TodaiAuth.userId(),
            user: { label: TodaiAuth.userLabel() },
          });
        });
        return;
      }
      appReady = true;
      document.getElementById("send").disabled = false;
      document.getElementById("msg").disabled = false;
      onAppReady(authCtx);
      showAuthScreen(false);
    }

    if (!isFileProtocol) {
      startApp();
    }
  </script>
</body>
</html>
